<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorahk's Expense Tracker | Dashboard</title>
  <link rel="stylesheet" href="stylesheets/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <main class="dashboard-container">
    <header class="main-header">
      <div class="logo-area">
        <i class="fas fa-wallet"></i>
        <h3 class="heading-main">Lorahk's <span>Expense</span></h3>
      </div>
      <div class="header-stats">
        <div class="stat-pill">
          <span class="label">Balance</span>
          <span class="value" id="total-amount">₹0.00</span>
        </div>
      </div>
    </header>

    <div class="content-grid">
      <aside class="input-card">
        <h4 class="section-title"><i class="fas fa-plus-circle"></i> New Transaction</h4>
        
        <div class="form-group">
          <label>Item Name</label>
          <input type="text" class="form-controls item-input" placeholder="e.g., MacBook Air">
        </div>

        <div class="form-group">
          <label>Category</label>
          <select class="form-controls custom-select" id="category-selector">
            <option value="General">General</option>
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Travel">Travel</option>
            <option value="Entertainment">Entertainment</option>
          </select>
        </div>

        <div class="form-group">
          <label>Amount</label>
          <div class="amount-input-wrapper">
            <span>₹</span>
            <input type="number" class="form-controls amount-input" placeholder="0.00">
          </div>
        </div>

        <div class="form-group">
          <label>Paid Status</label>
          <div class="status-toggle-group">
            <button type="button" class="toggle-btn active" id="btn-yes" data-value="true">Yes</button>
            <button type="button" class="toggle-btn" id="btn-no" data-value="false">No</button>
          </div>
          <input type="hidden" id="paid-status-hidden" value="true">
        </div>

        <button class="submit-button" onclick="getData()" id="getData">
          Add Transaction
        </button>
      </aside>

      <section class="display-card scrollable-content">
        <div class="display-header">
          <h4 class="section-title"><i class="fas fa-history"></i> Recent Activity</h4>
          <div class="filter-btns">
            <button class="filter-btn active">All</button>
          </div>
        </div>

        <div class="table-wrapper">
          <table id="showInsertedData">
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="viewInsertedData">
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="javascripts/script.js"></script>
</body>
</html>
