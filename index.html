<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorahk's Expense Tracker | Dashboard</title>
  <link rel="stylesheet" href="stylesheets/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
</head>

<body>
  <main class="dashboard-container">
    <header class="main-header">
      <div class="logo-area">
        <i class="fas fa-wallet"></i>
        <h3 class="heading-main">Lorahk's <span>Expense</span></h3>
      </div>
      <div class="header-stats">
        <div class="stat-pill">
          <span class="label header-label">Total Spendings</span>
          <span class="value" id="total-amount">₹0.00</span>
        </div>
      </div>
    </header>

    <div class="content-grid">
      <!-- Input Card 1: Entry Form -->
      <aside class="input-card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
          <h4 class="section-title"><i class="fas fa-plus-circle"></i> New Transaction</h4>
          <button class="switch-btn"
            style="background:none; border:none; color:var(--accent-color); cursor:pointer;">&#8646; Switch</button>
        </div>

        <div class="form-group">
          <label>Item Name</label>
          <input type="text" class="form-controls item-input" placeholder="e.g., MacBook Air">
        </div>

        <div class="form-group">
          <label>Category</label>
          <select class="form-controls custom-select" id="category-selector">
            <option value="General">General</option>
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Travel">Travel</option>
            <option value="Entertainment">Entertainment</option>
          </select>
        </div>

        <div class="form-group">
          <label>Amount</label>
          <div class="amount-input-wrapper">
            <span>₹</span>
            <input type="number" class="form-controls amount-input" placeholder="0.00" min="0">
          </div>
        </div>

        <div class="form-group">
          <label>Paid Status</label>
          <div class="status-toggle-group" style="display: flex; gap: 10px;">
            <button type="button" class="toggle-btn active" id="btn-yes">Yes</button>
            <button type="button" class="toggle-btn" id="btn-no">No</button>
          </div>
          <input type="hidden" id="paid-status-hidden" value="true">
        </div>

        <button class="submit-button" onclick="getData()">Add Transaction</button>
      </aside>

      <!-- Input Card 2: Budget View -->
      <aside class="input-card-switched" style="display: none">
        <div id="switch-elements" style="display:flex; justify-content: space-between; align-items: center;">
          <h4 class="section-title"><i class="fas fa-chart-line"></i> Budget View</h4>
          <button class="switch-btn-switched"
            style="background:none; border:none; color:var(--accent-color); cursor:pointer;">&#8646; Back</button>
        </div>

        <div class="form-group">
          <label>Total Spendings</label>
          <span class="form-controls" id="switched-total">₹0.00</span>
        </div>

        <div class="form-group">
          <label>Your Budget</label>
          <div class="amount-input-wrapper">
            <span>₹</span>
            <input type="number" class="form-controls" id="budget-input" placeholder="0.00">
          </div>
        </div>

        <div class="form-group">
          <label>Your Balance</label>
          <span class="form-controls" id="switched-balence"></span>
        </div>

        <button class="submit-button" id="submit-info-btn">Update Budget</button>
      </aside>

      <!-- Display Section -->
      <section class="display-card">
        <div class="display-header">
          <h4 class="section-title"><i class="fas fa-history"></i> Recent Activity</h4>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="viewInsertedData"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
  <script src="javascripts/script.js"></script>
</body>

</html>
